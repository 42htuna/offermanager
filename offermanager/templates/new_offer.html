{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
    .select2-container--default .select2-selection--single { height: 38px; border: 1px solid #ced4da; }
    .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 36px; }
    .select2-results__message { color: #D90011 !important; }
</style>

{% if error_message %}<div class="alert alert-warning">{{ error_message }}</div>{% endif %}

{% if customer_list %}
<form method="POST" action="{% url 'new_offer' %}" name="customer" class="form-default">
    {% csrf_token %}
    <div class="card card-primary">
        <div class="card-header">{% trans 'Select Customer' %}</div>
        <div class="card-body">
            <div class="form-group row">
                <label class="col-sm-3 control-label">{% trans 'Customer : ' %}</label>
                <div class="col-sm-6">
                    <!-- data-smart-search ve çeviriler eklendi -->
                    <select class="form-control" name="customer_id" id="customer_select" 
                            data-smart-search="true"
                            data-placeholder="{% trans '(Select)' %}"
                            data-no-results-text="{% trans 'Customer record not found!' %}"
                            data-searching-text="{% trans 'Searching...' %}">
                        <option value="None">{% trans '(Select)' %}</option>
                        {% for customer in customer_list %}
                        <!-- data-id ve data-name base.html tarafından okunuyor -->
                        <option value="{{ customer.id }}" data-id="{{ customer.id }}" data-name="{{ customer.name | lower }}">
                            {{ customer.name }} - ID: ({{ customer.id }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
        <div class="card-footer">
            <a href="{% url 'new_customer' %}" class="btn btn-default my-2 my-sm-0 btn-sm">{% trans 'Add New Customer' %}</a>
            <input class="btn btn-outline-primary my-2 my-sm-0 btn-sm" type="submit" value="{% trans 'Create Offer' %}">
        </div>
    </div>
</form>
{% else %}<div class="alert alert-info">{% trans 'No customers!' %}</div>{% endif %}

<!-- Sadece kütüphaneleri yüklüyoruz, özel script yazmıyoruz -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
{% endblock %}
